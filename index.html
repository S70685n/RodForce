<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rod Force Calculator</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    margin: 0;
    padding: 20px;
    color: #c5a000; /* DARKER GOLD */
}

.container {
    max-width: 500px;
    margin: auto;
    background: #111;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(197,160,0,0.25);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    letter-spacing: 1px;
}

label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
}

input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 14px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid #c5a000;
    background: #000;
    color: #c5a000;
}

button.calc {
    background: #c5a000;
    color: black;
    border: none;
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button.calc:hover {
    background: #e0b800;
}

button.reset {
    background: #333;
    color: #c5a000;
    border: none;
    width: 100%;
    padding: 14px;
    font-size: 18px;
    border-radius: 6px;
    margin-top: 10px;
    cursor: pointer;
}

/* FANCY RESULT BOX */
.result {
    margin-top: 20px;
    padding: 18px;
    font-size: 22px;
    font-weight: bold;
    text-align: center;
    border-radius: 10px;
    background: linear-gradient(145deg, #111, #000);
    border: 1px solid #c5a000;
    box-shadow: 0 0 12px rgba(197,160,0,0.4);
    letter-spacing: 1px;
    transition: all 0.3s ease;
}

/* subtle glow when updated */
.result.active {
    box-shadow: 0 0 20px rgba(197,160,0,0.7);
    transform: scale(1.02);
}
</style>
</head>

<body>

<div class="container">

<h2>Rod Force</h2>

<label>Input Type</label>
<select id="rodType" onchange="updateRodUnits()">
    <option value="force">Rod Force to Nitrogen Pressure</option>
    <option value="pressure">Nitrogen Pressure to Rod Force</option>
</select>

<label>Value (Rod Force result on dyno or nitrogen pressure specification)</label>
<input id="rodValue">

<label>Unit of Measurement (Verify whether dyno specifications are in lbs/psi or Newtons/bar)</label>
<select id="rodUnit"></select>

<label>Shaft Size</label>
<select id="shaft">
    <option value="0.196">1/2 inch</option>
    <option value="0.307" selected>5/8 inch</option>
    <option value="0.601">7/8 inch</option>
</select>

<button class="calc" onclick="calculateRod()">Calculate</button>
<button class="reset" onclick="resetRod()">Reset</button>

<div id="rodResult" class="result"></div>

</div>

<script>
function updateRodUnits(){
    rodUnit.innerHTML="";
    if(rodType.value==="force"){
        rodUnit.innerHTML =
            "<option value='lbs'>lbs</option>" +
            "<option value='N'>Newtons</option>";
    } else {
        rodUnit.innerHTML =
            "<option value='psi'>psi</option>" +
            "<option value='bar'>bar</option>";
    }
}

function calculateRod(){
    let v = parseFloat(rodValue.value);
    let f = parseFloat(shaft.value);

    if (isNaN(v)) {
        rodResult.innerText = "Enter a valid value";
        return;
    }

    let resultText = "";

    if (rodType.value === "force") {
        if (rodUnit.value === "N") v *= 0.224809;

        let psi = v / f;
        let bar = psi / 14.5038;

        resultText = `Pressure = ${psi.toFixed(2)} psi (${bar.toFixed(2)} bar)`;

    } else {
        let psi = (rodUnit.value === "bar") ? v * 14.5038 : v;

        let lbs = psi * f;
        let newtons = lbs / 0.224809;

        resultText = `Force = ${lbs.toFixed(2)} lbs (${newtons.toFixed(2)} N)`;
    }

    rodResult.innerText = resultText;

    // trigger glow animation
    rodResult.classList.remove("active");
    void rodResult.offsetWidth; // reset animation
    rodResult.classList.add("active");
}

function resetRod(){
    rodValue.value="";
    rodResult.innerText="";
    rodResult.classList.remove("active");
}

updateRodUnits();
</script>

</body>
</html>
