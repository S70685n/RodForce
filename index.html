<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rod Force Tool</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000;
    color: #e0b800;
    margin: 0;
    padding: 20px;
}

.container {
    max-width: 500px;
    margin: auto;
    background: #111;
    padding: 20px;
    border-radius: 12px;
    border: 2px solid red;
    box-shadow: 0 0 20px rgba(255,0,0,0.4);
}

/* HEADER */
h2 {
    text-align: center;
    color: red;
    letter-spacing: 2px;
}

/* LABELS */
label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
}

/* INPUTS */
input, select {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    font-size: 18px;
    border-radius: 6px;
    border: 1px solid red;
    background: #000;
    color: #e0b800;
}

/* PRESET BUTTONS */
.preset-row {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.preset-btn {
    flex: 1;
    padding: 12px;
    background: #222;
    color: #e0b800;
    border: 1px solid red;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.preset-btn.active {
    background: red;
    color: black;
}

/* RESULT DISPLAY */
.result-box {
    margin-top: 20px;
    padding: 20px;
    text-align: center;
    border-radius: 10px;
    background: #000;
    border: 2px solid red;
}

.main-value {
    font-size: 36px;
    font-weight: bold;
    letter-spacing: 2px;
}

.sub-value {
    font-size: 18px;
    margin-top: 5px;
}

</style>
</head>

<body>

<div class="container">

<h2>ROD FORCE TOOL</h2>

<label>Mode</label>
<select id="rodType">
    <option value="force">Force → Pressure</option>
    <option value="pressure">Pressure → Force</option>
</select>

<label>Unit</label>
<select id="rodUnit"></select>

<label>Value</label>
<input id="rodValue" placeholder="Enter value">

<label>Shaft Size</label>

<div class="preset-row">
    <button class="preset-btn" onclick="setShaft(0.196,this)">1/2</button>
    <button class="preset-btn active" onclick="setShaft(0.307,this)">5/8</button>
    <button class="preset-btn" onclick="setShaft(0.601,this)">7/8</button>
</div>

<!-- RESULT -->
<div class="result-box">
    <div id="mainResult" class="main-value">--</div>
    <div id="subResult" class="sub-value"></div>
</div>

</div>

<script>
let shaftFactor = 0.307;

function updateRodUnits(){
    rodUnit.innerHTML="";
    if(rodType.value==="force"){
        rodUnit.innerHTML =
            "<option value='lbs'>lbs</option>" +
            "<option value='N'>Newtons</option>";
    } else {
        rodUnit.innerHTML =
            "<option value='psi'>psi</option>" +
            "<option value='bar'>bar</option>";
    }
}

function setShaft(val,btn){
    shaftFactor = val;
    document.querySelectorAll('.preset-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    calculateRod();
}

function calculateRod(){
    let v = parseFloat(rodValue.value);
    if(isNaN(v)){
        mainResult.innerText = "--";
        subResult.innerText = "";
        return;
    }

    let psi, bar, lbs, N;

    if (rodType.value === "force") {
        if (rodUnit.value === "N") v *= 0.224809;
        psi = v / shaftFactor;
        bar = psi / 14.5038;

        mainResult.innerText = psi.toFixed(1) + " PSI";
        subResult.innerText = bar.toFixed(2) + " bar";

    } else {
        psi = (rodUnit.value === "bar") ? v * 14.5038 : v;
        lbs = psi * shaftFactor;
        N = lbs / 0.224809;

        mainResult.innerText = lbs.toFixed(1) + " LBS";
        subResult.innerText = N.toFixed(1) + " N";
   
}

/* LIVE CALCULATION */
rodValue.oninput = calculateRod;
rodUnit.onchange = calculateRod;
rodType.onchange = () => {
    updateRodUnits();
    calculateRod();
};

updateRodUnits();
</script>

</body>
</html>
